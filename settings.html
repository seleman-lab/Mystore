<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyStore - Settings</title>
    <link rel="icon" href="assets/logo.png" type="/x-icon">
    <meta name="description" content="MyStore Settings.">
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-page {
            max-width: 700px;
            margin: 2rem auto;
        }

        .settings-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
        }

        .settings-card h2 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        .settings-card .card-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .settings-card:hover {
            transform: none;
        }

        .settings-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-group:last-child {
            border-bottom: none;
        }

        .settings-group h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        .settings-group p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .form-row {
            margin-bottom: 1rem;
        }

        .form-row label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-row input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-row input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .form-row input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-save {
            padding: 0.7rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        .btn-save:hover {
            background-color: var(--primary-hover);
        }

        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .success-msg {
            background-color: #d4edda;
            color: #155724;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
            border: 1px solid #c3e6cb;
        }

        .error-msg {
            background-color: #f8d7da;
            color: #721c24;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="nav-brand">MyStore</a>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                &#9776;
            </button>
            <div class="nav-links" id="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="settings.html" class="active">Settings</a>
                <a href="help.html">Help</a>
                <a href="index.html">Logout</a>
                <a href="https://seleman.edgeone.dev" target="_blank"><span style="color: rgb(199, 199, 199);">Sele</span><span style="color: #8076f3;">man</span></a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="dashboard-header">
            <h1>Settings</h1>
        </div>

        <div class="settings-page">
            <!-- Theme Toggle -->
            <div class="settings-card">
                <h2>Appearance</h2>
                <p class="card-subtitle">Customize your viewing experience.</p>
                <div class="settings-group">
                    <div>
                        <h3>Dark Mode</h3>
                        <p>Toggle between light and dark themes.</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Edit Profile -->
            <div class="settings-card">
                <h2>Profile Information</h2>
                <p class="card-subtitle">Update your personal details.</p>

                <div class="success-msg" id="profile-success"></div>
                <div class="error-msg" id="profile-error"></div>

                <form id="settings-form">
                    <div class="form-row">
                        <label for="settings-name">Full Name</label>
                        <input type="text" id="settings-name" class="form-control" required placeholder="Your name">
                    </div>

                    <div class="form-row">
                        <label for="settings-email">Email Address</label>
                        <input type="email" id="settings-email" class="form-control" disabled placeholder="your@email.com">
                        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.3rem;">Email cannot be changed.</p>
                    </div>

                    <div class="form-row">
                        <label for="settings-phone">Phone Number</label>
                        <input type="tel" id="settings-phone" class="form-control" placeholder="+250 7** *** ***">
                    </div>

                    <button type="submit" class="btn-save">Save Changes</button>
                </form>
            </div>

            <!-- Change Password -->
            <div class="settings-card">
                <h2>Change Password</h2>
                <p class="card-subtitle">Update your account password.</p>

                <div class="success-msg" id="password-success"></div>
                <div class="error-msg" id="password-error"></div>

                <form id="password-form">
                    <div class="form-row">
                        <label for="current-password">Current Password</label>
                        <input type="password" id="current-password" class="form-control" required placeholder="Enter current password" autocomplete="current-password">
                    </div>

                    <div class="form-row">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" class="form-control" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password">
                    </div>

                    <div class="form-row">
                        <label for="confirm-password">Confirm New Password</label>
                        <input type="password" id="confirm-password" class="form-control" required placeholder="Confirm new password" autocomplete="new-password">
                    </div>

                    <button type="submit" class="btn-save">Change Password</button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
