<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Security Questions - MyStore</title>
    <link rel="icon" href="assets/logo.png" type="/x-icon">
    <link rel="stylesheet" href="style.css">
    <style>
        .questions-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .questions-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .questions-card h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .questions-card .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 6px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        #questions-container {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 2rem;
        }

        #questions-container .form-group {
            margin-bottom: 1.8rem;
            padding-bottom: 1.8rem;
            border-bottom: 1px solid #e0e0e0;
        }

        #questions-container .form-group:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        #questions-container label {
            color: #000 !important;
            font-weight: 700;
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1.05em;
            line-height: 1.5;
        }
        #questions-container .question-text {
            font-size: 1.05em;
            color: #000;
            margin-bottom: 0.6rem;
            line-height: 1.4;
        }

        #questions-container input {
            color: #000 !important;
            background-color: #ffffff;
            border: 2px solid #ddd;
            padding: 12px 14px;
            font-size: 0.95em;
            border-radius: 5px;
            transition: all 0.3s;
            width: 100%;
            font-family: inherit;
        }

        #questions-container input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #questions-container input::placeholder {
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 2rem;
        }

        .btn-get-otp {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-get-otp:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-get-otp:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-back {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: #e0e0e0;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            display: none;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #0c5aa0;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-get-otp.loading {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .questions-card {
                padding: 20px;
            }

            .questions-card h1 {
                font-size: 22px;
            }

            #questions-container {
                padding: 15px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">MyStore</a>
            <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
            <div class="nav-links" id="nav-links">
                <a href="login.html">Login</a>
                <a href="signup.html">Sign Up</a>
                <a href="">Help</a>
                <a href="https://seleman.edgeone.dev" target="_blank"><span style="color: rgb(199, 199, 199);">Sele</span><span style="color: #8076f3;">man</span></a>
            </div>
        </div>
    </nav>

    <div class="questions-wrapper">
        <div class="questions-card">
            <h1>Security Verification</h1>
            <p class="subtitle">Answer your security questions to verify your identity and receive an OTP</p>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>

            <div class="info-box">
                ℹ️ Please answer the security questions you set up during registration.
            </div>

            <form id="answer-questions-form">
                <div id="questions-container">
                    <!-- Questions will be loaded here dynamically -->
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-get-otp" id="get-otp-btn">
                        <span class="loading-spinner" id="spinner"></span>
                        Get OTP Code
                    </button>
                    <button type="button" class="btn-back" id="back-btn">Back to Email</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Answer Questions Page Logic
        document.addEventListener('DOMContentLoaded', async () => {
            const answersForm = document.getElementById('answer-questions-form');
            const getOtpBtn = document.getElementById('get-otp-btn');
            const backBtn = document.getElementById('back-btn');
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const spinner = document.getElementById('spinner');
            const questionsContainer = document.getElementById('questions-container');

            // Get email from URL parameter or sessionStorage
            const urlParams = new URLSearchParams(window.location.search);
            let userEmail = urlParams.get('email') || sessionStorage.getItem('resetEmail');

            if (!userEmail) {
                errorMsg.textContent = 'No email provided. Please start from the forgot password page.';
                errorMsg.style.display = 'block';
                getOtpBtn.disabled = true;
                backBtn.href = '/forgot.html';
                return;
            }

            // Store email in sessionStorage
            sessionStorage.setItem('resetEmail', userEmail);

            try {
                // Fetch security questions
                const response = await fetch('/get-security-questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                const data = await response.json();

                if (response.ok) {
                    // Display questions
                    questionsContainer.innerHTML = '';
                    data.questions.forEach((question, index) => {
                        const div = document.createElement('div');
                        div.className = 'form-group';
                        div.innerHTML = `
                            <div class="question-text"><strong>Question ${index + 1}:</strong> ${question}</div>
                            <label for="answer-${index}">Your Answer</label>
                            <input 
                                type="text" 
                                id="answer-${index}"
                                class="form-control security-answer" 
                                placeholder="Type your answer here" 
                                aria-label="Answer to question ${index + 1}"
                                data-index="${index}" 
                                required
                                autocomplete="off"
                                tabindex="${index + 1}"
                            >
                        `;
                        questionsContainer.appendChild(div);
                    });

                    // Update progress
                    updateProgress();
                } else {
                    errorMsg.textContent = data.error || 'Failed to load questions';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error("Error loading questions:", error);
                errorMsg.textContent = 'A network error occurred. Please try again.';
                errorMsg.style.display = 'block';
            }

            // Form submission
            answersForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                successMsg.style.display = 'none';

                const answers = [];
                document.querySelectorAll('.security-answer').forEach(input => {
                    answers.push(input.value.trim());
                });

                if (answers.some(a => !a)) {
                    errorMsg.textContent = 'Please answer all questions';
                    errorMsg.style.display = 'block';
                    return;
                }

                // Show loading state
                getOtpBtn.disabled = true;
                spinner.style.display = 'inline-block';
                const originalText = getOtpBtn.innerText;

                try {
                    const response = await fetch('/verify-security-questions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: userEmail, answers })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        successMsg.innerHTML = `
                            <strong>✓ Success!</strong> ${data.message}<br>
                            <small>Check your email for the OTP code, or use the test OTP: <strong>${data.testOTP || 'N/A'}</strong></small>
                        `;
                        successMsg.style.display = 'block';

                        // Store test OTP if available
                        if (data.testOTP) {
                            sessionStorage.setItem('testOTP', data.testOTP);
                            // Show alert with OTP code
                            alert(`✓ Answers Verified!\n\nYour OTP Code: ${data.testOTP}\n\nPlease use this code to reset your password.`);
                        }

                        // Redirect after 2 seconds
                        setTimeout(() => {
                            window.location.href = `verify-otp.html?email=${encodeURIComponent(userEmail)}`;
                        }, 2000);
                    } else {
                        errorMsg.textContent = data.error || 'Failed to verify answers';
                        errorMsg.style.display = 'block';
                    }
                } catch (error) {
                    console.error("Error verifying answers:", error);
                    errorMsg.textContent = 'A network error occurred. Please try again.';
                    errorMsg.style.display = 'block';
                } finally {
                    getOtpBtn.disabled = false;
                    spinner.style.display = 'none';
                }
            });

            // Back button
            backBtn.addEventListener('click', () => {
                window.location.href = 'forgot.html';
            });

            // Update progress bar as user types
            function updateProgress() {
                const answers = document.querySelectorAll('.security-answer');
                const filled = Array.from(answers).filter(a => a.value.trim()).length;
                const progress = (filled / answers.length) * 100;
                document.querySelector('.progress-fill').style.width = progress + '%';
            }

            document.addEventListener('input', (e) => {
                if (e.target.classList.contains('security-answer')) {
                    updateProgress();
                }
            });
        });
    </script>
</body>
</html>
